name: go-mod-ci

on:
  push:
    branches:
      - master
      - dev
    tags:
      - 'v*'

env:
  RELEASE_ZIP_FILE_NAME: bindgen

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Setup Python for XED
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone ewdk repository
        run: |
          cd $env:GITHUB_WORKSPACE\..
          git clone https://github.com/ddkwork/ewdk.git

      - name: Install aria2 (via ewdk)
        working-directory: ..\ewdk
        run: |
          $ProgressPreference = 'SilentlyContinue'
          $aria2Url = "https://github.com/aria2/aria2/releases/download/release-1.37.0/aria2-1.37.0-win-64bit-build1.zip"
          Invoke-WebRequest -Uri $aria2Url -OutFile "$env:TEMP\aria2.zip" -UseBasicParsing
          Expand-Archive -Path "$env:TEMP\aria2.zip" -DestinationPath "$env:TEMP\aria2" -Force
          Get-ChildItem "$env:TEMP\aria2" -Filter "aria2c.exe" -Recurse | Move-Item -Destination "$env:TEMP\aria2c.exe" -Force

      - name: Cache EWDK ISO
        id: cache-iso
        uses: actions/cache@v5
        with:
          path: C:\Users\runneradmin\AppData\Local\Temp\ewdk.iso
          key: ewdk-iso-${{ hashFiles('../ewdk/scripts/get_ewdk_url.go') }}
          restore-keys: |
            ewdk-iso-

      - name: Download EWDK ISO (via ewdk)
        if: steps.cache-iso.outputs.cache-hit != 'true'
        working-directory: ..\ewdk
        run: |
          go run scripts/get_ewdk_url.go
          $ewdkUrl = Get-Content "$env:GITHUB_ENV" | Select-String "EWDK_ISO_URL=" | ForEach-Object { $_.ToString().Replace("EWDK_ISO_URL=", "").Trim() }
          Write-Host "Downloading EWDK ISO from: $ewdkUrl"
          & "$env:TEMP\aria2c.exe" -x16 -s16 --file-allocation=none -d "$env:TEMP" -o ewdk.iso $ewdkUrl
          $fileSize = (Get-Item "$env:TEMP\ewdk.iso").Length
          Write-Host "ISO downloaded: $([math]::Round($fileSize/1MB, 2)) MB"

      - name: Mount EWDK ISO and set registry environment (via ewdk main.go)
        working-directory: ..\ewdk
        run: go run .

      - name: Clone zydis source (recursive, for zycore dependency)
        run: |
          New-Item -ItemType Directory -Path "project\zydis\clone" -Force | Out-Null
          cd project\zydis\clone
          git clone --recursive https://github.com/zyantific/zydis.git

      - name: Clone keystone source
        run: |
          New-Item -ItemType Directory -Path "project\keystone\clone" -Force | Out-Null
          cd project\keystone\clone
          git clone --recursive https://github.com/keystone-engine/keystone.git

      - name: Clone xed source
        run: |
          New-Item -ItemType Directory -Path "project\xed\clone" -Force | Out-Null
          cd project\xed\clone
          git clone --recursive https://github.com/intel/xed.git

      - name: Clone hyperdbg source
        run: |
          New-Item -ItemType Directory -Path "project\hyperdbg\clone" -Force | Out-Null
          cd project\hyperdbg\clone
          git clone --recursive https://github.com/ddkwork/HyperDbg.git

      - name: Build zydis (via build.cmd)
        shell: cmd
        run: |
          cd project\zydis
          build.cmd

      - name: Build keystone (via build.bat)
        shell: cmd
        run: |
          cd project\keystone
          build.bat

      - name: Build xed (via mbuild --shared)
        run: |
          cd project\xed\clone
          pip install mbuild
          cd xed
          python mfile.py --shared --msvs-version 17 install
          $kitDir = Get-ChildItem kits -Directory | Select-Object -First 1
          if ($kitDir) {
            $dll = Get-ChildItem "$($kitDir.FullName)/bin" -Filter "*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($dll) {
              Copy-Item $dll.FullName "../../xed.dll"
              Write-Host "Copied xed.dll from kit"
            }
          }

      - name: Build hyperdbg (via build.bat)
        shell: cmd
        run: |
          cd project\hyperdbg
          build.bat

      - name: Install Go dependencies
        run: go mod tidy

      - name: Run bindgen generator
        run: go test -v -run TestGenerate -count=1 -timeout 300s .

      - name: Verify generated code compiles
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Test zydis
        run: |
          cd project/zydis
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test keystone
        run: |
          cd project/keystone
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test xed
        run: |
          cd project/xed
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test hyperdbg
        run: |
          cd project/hyperdbg/sdk
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test ARImpRec
        run: |
          cd project/ARImpRec
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test WinDivert
        run: |
          cd project/WinDivert
          go mod tidy
          go test -count=1 -v -timeout 120s .

      - name: Test Everything-SDK
        run: |
          cd project/Everything-SDK
          go mod tidy
          go test -count=1 -v -timeout 120s .

  package-and-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'

      - name: Install dependencies
        run: go mod tidy

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0.0'

      - name: Install GitHub Changelog Generator
        run: gem install github_changelog_generator

      - name: Generate Changelog
        run: github_changelog_generator --user ${{ github.repository_owner }} --project ${{ github.event.repository.name }} --token ${{ secrets.GITHUB_TOKEN }}

      - name: Create source code archive
        run: zip -r ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip . -x '.git/**'

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.RELEASE_ZIP_FILE_NAME }}-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.tk }}
